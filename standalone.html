<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0B0C08" />
<title>CALIBR — Posture Coach</title>
<style>
/* =========================================================================
   CALIBR — Posture Coach
   Deep-black + single teal accent (Aruba Blue). Frosted-glass bento.
   Note: the --lime* token names are retained for the teal accent (legacy).
   Pure CSS. Icons/charts are inline SVG (see app.js).
   ========================================================================= */

:root{
  /* Color */
  --bg:#0B0C08;
  --bg-2:#0E0F0B;
  --ink:#F5F6F0;
  --muted:#8E927E;
  --muted-2:#5E6156;
  --lime:#87D8CE;           /* accent — Aruba Blue (teal / mint) */
  --lime-hi:#A6E7DF;
  --lime-deep:#54BEB2;
  --lime-ink:#04211D;       /* dark text on teal fills */
  --warn:#F0B54A;           /* caution amber */
  --warn-soft:rgba(240,181,74,.14);
  --alert:#FF6B5B;          /* problem joint / phase — red family */
  --alert-soft:rgba(255,107,91,.15);
  --mint:#A6E7DF;           /* glow-figure body */
  /* soft aurora/jelly fill for selected condition items (teal-mint, colors bleeding) */
  --aurora:radial-gradient(120% 120% at 16% 14%,rgba(186,244,230,.95),transparent 55%),
           radial-gradient(120% 120% at 86% 24%,rgba(140,206,240,.6),transparent 55%),
           radial-gradient(130% 130% at 78% 96%,rgba(188,246,208,.72),transparent 55%),
           radial-gradient(120% 120% at 24% 92%,rgba(96,192,180,.9),transparent 60%),
           linear-gradient(140deg,#7ad7ca,#4fb6aa);

  /* Clear glass — transparent fill, light blur, bright edge highlight */
  --glass:rgba(255,255,255,.07);
  --glass-2:rgba(255,255,255,.1);
  --stroke:rgba(255,255,255,.22);
  --stroke-hi:rgba(255,255,255,.34);
  --blur:9px;
  --hairline:inset 0 1px 0 rgba(255,255,255,.4);

  /* Radii */
  --r-xl:34px; --r-lg:28px; --r-md:22px; --r-sm:16px; --r-pill:999px;

  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",
         "Segoe UI","Pretendard","Apple SD Gothic Neo",Roboto,"Helvetica Neue",Arial,sans-serif;

  --shadow:0 16px 40px -20px rgba(0,0,0,.5);
  --shadow-lime:0 18px 44px -14px rgba(135,216,206,.42);
  --tab-h:80px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);background:#060704;color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow:hidden;display:grid;place-items:center;letter-spacing:-.01em;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit}
:focus-visible{outline:2px solid var(--lime);outline-offset:2px;border-radius:8px}
img,svg{max-width:100%}

/* Ambient behind the whole viewport (desktop) */
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.6}
.glow-a{width:460px;height:460px;background:radial-gradient(circle,rgba(135,216,206,.20),transparent 70%);top:-140px;right:-120px}
.glow-b{width:560px;height:560px;background:radial-gradient(circle,rgba(40,115,106,.16),transparent 70%);bottom:-200px;left:-180px}

/* ---- Phone frame ---------------------------------------------------------*/
.phone{
  position:relative;width:100%;max-width:432px;height:100dvh;max-height:936px;
  background:linear-gradient(180deg,#0C0D09,#090A06);
  overflow:hidden;z-index:1;display:flex;flex-direction:column;isolation:isolate;
}
/* In-phone colored light so frosted glass has something to bleed */
.phone::before,.phone::after{content:"";position:absolute;pointer-events:none;z-index:0;filter:blur(6px)}
.phone::before{top:-40px;right:-50px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(135,216,206,.16),transparent 68%)}
.phone::after{bottom:60px;left:-80px;width:340px;height:340px;
  background:radial-gradient(circle,rgba(45,120,112,.13),transparent 70%)}
@media(min-width:480px){
  .phone{height:min(93vh,912px);border-radius:54px;
    box-shadow:0 70px 130px -40px rgba(0,0,0,.85),inset 0 0 0 10px #040502,0 0 0 1px rgba(255,255,255,.06)}
  .notch{display:block}
}
.notch{display:none;position:absolute;top:13px;left:50%;transform:translateX(-50%);
  width:120px;height:30px;background:#040502;border-radius:20px;z-index:40}

.statusbar{position:relative;z-index:20;flex:0 0 auto;height:52px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  font-size:14px;font-weight:600;color:var(--ink)}
.sb-right{display:flex;align-items:center;gap:6px}
@media(min-width:480px){.statusbar{padding-top:10px}}

/* ---- Screen scroller -----------------------------------------------------*/
.screen{position:relative;z-index:10;flex:1 1 auto;overflow-y:auto;overflow-x:hidden;
  padding:4px 18px calc(var(--tab-h) + 30px);scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{width:0}.screen{scrollbar-width:none}
.screen>*{animation:rise .55s cubic-bezier(.2,.75,.2,1) both}
.screen>*:nth-child(2){animation-delay:.05s}
.screen>*:nth-child(3){animation-delay:.10s}
.screen>*:nth-child(4){animation-delay:.15s}
.screen>*:nth-child(5){animation-delay:.20s}
.screen>*:nth-child(6){animation-delay:.25s}
.screen>*:nth-child(7){animation-delay:.30s}
.screen>*:nth-child(8){animation-delay:.34s}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ---- Type ----------------------------------------------------------------*/
.eyebrow{font-size:10.5px;font-weight:750;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.h1{font-size:29px;font-weight:820;letter-spacing:-.035em;line-height:1.06}
.h2{font-size:20px;font-weight:780;letter-spacing:-.025em}
.h3{font-size:15.5px;font-weight:720;letter-spacing:-.015em}
.body{font-size:14.5px;line-height:1.5}
.small{font-size:12.5px;line-height:1.45}
.dim{color:var(--muted)}.dim-2{color:var(--muted-2)}.lime{color:var(--lime)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.mega{font-size:66px;font-weight:850;letter-spacing:-.055em;line-height:.86;font-variant-numeric:tabular-nums}
.big{font-size:44px;font-weight:840;letter-spacing:-.04em;line-height:.92;font-variant-numeric:tabular-nums}
.med{font-size:30px;font-weight:820;letter-spacing:-.035em;line-height:1;font-variant-numeric:tabular-nums}
.unit{font-size:15px;font-weight:650;color:var(--muted);letter-spacing:0}

/* ---- Clear glass card (like the reference weather widget) ----------------*/
.card{position:relative;
  background:linear-gradient(152deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.055) 44%,rgba(255,255,255,.035) 100%);
  border:1px solid var(--stroke);border-radius:var(--r-lg);padding:18px;
  backdrop-filter:blur(var(--blur)) saturate(112%);-webkit-backdrop-filter:blur(var(--blur)) saturate(112%);
  box-shadow:var(--shadow),var(--hairline)}
.card-tight{padding:15px}
.card-xl{border-radius:var(--r-xl);padding:22px}
.pad-lg{padding:22px}

/* hero card = same clear glass, a touch brighter + stronger edge highlight */
.card-lime{color:#fff;
  background:linear-gradient(150deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.075) 46%,rgba(255,255,255,.05) 100%);
  border:1px solid var(--stroke-hi);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.5)}
.card-lime .eyebrow{color:rgba(255,255,255,.66)}
.card-lime .dim{color:rgba(255,255,255,.6)}
.card-lime .num{color:#fff}
.card-lime .meter{background:rgba(255,255,255,.16)}
.card-lime .meter>i{background:#fff}
/* force the hero content light (overrides the old dark-on-teal inline colors) */
.card-lime .h1,.card-lime .h2,.card-lime .body,.card-lime .small,.card-lime .mega,.card-lime .big,.card-lime .med{color:#fff!important}
.card-lime .unit{color:rgba(255,255,255,.6)!important}

/* ---- Bento grid ----------------------------------------------------------*/
.bento{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch}
.bento.gap-sm{gap:10px}
.col-2{grid-column:1 / -1}
.mosaic{display:grid;grid-template-columns:1.02fr .98fr;grid-auto-rows:auto;gap:12px}
.mosaic .tall{grid-row:span 2}
.stack>*+*{margin-top:12px}
.v-between{display:flex;flex-direction:column;justify-content:space-between;height:100%}

/* ---- Header --------------------------------------------------------------*/
.head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 6px;gap:12px}
.head-titles{min-width:0}
.icon-btn{width:42px;height:42px;border-radius:50%;flex:0 0 auto;
  background:var(--glass-2);border:1px solid var(--stroke);display:grid;place-items:center;
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);transition:.16s}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.icon-btn.lime-ic svg{stroke:var(--lime)}
.icon-cluster{display:flex;gap:9px}
.avatar-badge{width:42px;height:42px;border-radius:50%;background:linear-gradient(150deg,#20241a,#14160f);
  border:1px solid var(--stroke-hi);display:grid;place-items:center;font-weight:780;font-size:15px;color:var(--lime);flex:0 0 auto}

/* ---- Pills / chips -------------------------------------------------------*/
.pill{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 13px;border-radius:var(--r-pill);
  font-size:12.5px;font-weight:680;background:var(--glass-2);border:1px solid var(--stroke);color:var(--ink);white-space:nowrap}
.pill-lime{background:rgba(135,216,206,.15);border-color:rgba(135,216,206,.32);color:var(--lime)}
.pill-warn{background:var(--warn-soft);border-color:rgba(240,181,74,.34);color:var(--warn)}
.pill-solid{background:var(--lime);color:var(--lime-ink);border:none}
.pill-dark{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.24);color:#fff}
.dot{width:7px;height:7px;border-radius:50%;background:var(--lime);flex:0 0 auto}
.dot-warn{background:var(--warn)}

.row{display:flex;align-items:center}.between{justify-content:space-between}
.wrap{flex-wrap:wrap}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}
.mt-6{margin-top:6px}.mt-8{margin-top:8px}.mt-10{margin-top:10px}.mt-12{margin-top:12px}
.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}
.grow{flex:1;min-width:0}.center{text-align:center}

/* ---- Condition check -----------------------------------------------------*/
.mood-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mood{aspect-ratio:1/.9;border-radius:var(--r-sm);background:var(--glass-2);border:1px solid var(--stroke);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);transition:.18s}
.mood svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round}
.mood .lab{font-size:11.5px;font-weight:680}
.mood[aria-pressed="true"]{background:#fff;border-color:#fff;color:#0c1210}
.mood[aria-pressed="true"] .lab{color:#0c1210}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{height:38px;padding:0 15px;border-radius:var(--r-pill);background:var(--glass-2);border:1px solid var(--stroke);
  font-size:13px;font-weight:640;color:var(--muted);transition:.15s}
.chip[aria-pressed="true"]{background:#fff;color:#0c1210;border-color:#fff}
/* Today's-mission hero gets the soft teal-mint aurora gradient (dark text on top) */
.mission-hero{background:
  radial-gradient(92% 78% at 8% 2%,rgba(178,244,232,.85),transparent 60%),
  radial-gradient(88% 88% at 98% 10%,rgba(132,214,246,.6),transparent 60%),
  radial-gradient(98% 100% at 88% 110%,rgba(126,240,190,.66),transparent 60%),
  radial-gradient(96% 98% at 12% 104%,rgba(92,208,194,.72),transparent 62%),
  linear-gradient(150deg,#55bdae,#3d9a90)!important;
  border-color:rgba(255,255,255,.44)}
.mission-hero .eyebrow{color:rgba(6,32,27,.74)!important}
.mission-hero .h1,.mission-hero .h2,.mission-hero .body,.mission-hero .small{color:#08211d!important;text-shadow:none}
.mission-hero .pill-dark{background:rgba(6,22,19,.36);border:1px solid rgba(255,255,255,.22);color:#fff}
.mission-hero .pill-dark svg{stroke:#fff}
/* condition-check selection uses the teal point colour (not white) */
.cond-card .mood[aria-pressed="true"]{background:var(--lime);border-color:var(--lime);color:var(--lime-ink);box-shadow:0 6px 18px -8px rgba(135,216,206,.55)}
.cond-card .mood[aria-pressed="true"] .lab{color:var(--lime-ink)}
.cond-card .chip[aria-pressed="true"]{background:var(--lime);color:var(--lime-ink);border-color:var(--lime);box-shadow:0 6px 16px -8px rgba(135,216,206,.5)}
/* This week card — subtle teal gradient box (distinct from the neutral STREAK card) */
.week-card{background:
  radial-gradient(120% 100% at 82% 0%,rgba(135,216,206,.24),transparent 62%),
  radial-gradient(120% 120% at 8% 100%,rgba(84,190,178,.16),transparent 60%),
  linear-gradient(152deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,.045) 100%);
  border-color:rgba(135,216,206,.36)}

/* ---- Meters --------------------------------------------------------------*/
.meter{height:8px;border-radius:var(--r-pill);background:rgba(255,255,255,.10);overflow:hidden}
.meter>i{display:block;height:100%;border-radius:inherit;background:var(--lime)}
.card-lime .meter{background:rgba(12,13,9,.2)}.card-lime .meter>i{background:var(--lime-ink)}
.ring{transform:rotate(-90deg)}

/* ---- Tab bar -------------------------------------------------------------*/
.tabbar{position:absolute;left:0;right:0;bottom:0;height:var(--tab-h);z-index:30;
  display:grid;grid-template-columns:1fr 1fr 92px 1fr 1fr;align-items:center;
  padding:0 10px calc(env(safe-area-inset-bottom,0));
  background:linear-gradient(180deg,rgba(11,12,8,.35),rgba(11,12,8,.94) 55%);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--stroke)}
.tab{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);
  font-size:10.5px;font-weight:680;padding-top:4px}
.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab[aria-current="page"]{color:#fff}
.tab[aria-current="page"] svg{filter:drop-shadow(0 0 8px rgba(255,255,255,.45))}
.tab-start{position:relative;display:grid;place-items:center}
.start-btn{width:72px;height:72px;border-radius:50%;transform:translateY(-18px);
  background:radial-gradient(120% 120% at 32% 22%,var(--lime-hi),var(--lime-deep));color:var(--lime-ink);
  display:grid;place-items:center;
  box-shadow:0 16px 32px -8px rgba(135,216,206,.55),0 0 0 7px rgba(135,216,206,.09);transition:transform .18s cubic-bezier(.2,.8,.2,1)}
.start-btn:active{transform:translateY(-18px) scale(.93)}
.start-btn svg{width:30px;height:30px;stroke:var(--lime-ink);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.start-lab{position:absolute;bottom:1px;font-size:10px;font-weight:780;color:var(--lime);letter-spacing:.04em}

/* ---- Swing avatar (signature) --------------------------------------------*/
.avatar-stage{position:relative;width:100%;border-radius:var(--r-md);overflow:hidden;
  background:
    radial-gradient(90% 72% at 50% 0%,rgba(135,216,206,.16),transparent 60%),
    linear-gradient(180deg,#0C0D09 0%,#090A06 100%);
  border:1px solid var(--stroke)}
.avatar-stage svg{display:block;width:100%;height:auto}
.avatar-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(150,230,220,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(150,230,220,.06) 1px,transparent 1px);
  background-size:26px 26px;mask-image:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent)}
.play-pill{position:absolute;top:13px;right:13px}
.phase-tag{position:absolute;left:13px;top:13px}

.skeleton .bone{stroke:var(--lime);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;fill:none}
.skeleton .joint{fill:var(--lime)}
.skeleton .club{stroke:rgba(245,246,240,.85);stroke-width:2.4;stroke-linecap:round;fill:none}
.skeleton.ghost .bone{stroke:rgba(142,146,126,.5);stroke-width:3}
.skeleton.ghost .joint{fill:rgba(142,146,126,.55)}
.skeleton.ghost .club{stroke:rgba(142,146,126,.4)}
.skeleton.warn .bone{stroke:var(--alert)}
.skeleton.warn .joint{fill:var(--alert)}
.skeleton.warn .club{stroke:rgba(255,107,91,.6)}

/* ---- Phase frames --------------------------------------------------------*/
.frames{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.frame{border-radius:14px;background:var(--glass-2);border:1px solid var(--stroke);
  padding:8px 5px 7px;text-align:center;position:relative;overflow:hidden}
.frame .mini{width:100%;border-radius:9px;background:#0A0B07;overflow:hidden;margin-bottom:6px}
.frame .mini svg{display:block;width:100%;height:auto}
.frame .fl{font-size:10.5px;font-weight:650;color:var(--muted)}
.frame.warn{border-color:rgba(255,107,91,.5);background:var(--alert-soft)}
.frame.warn .fl{color:var(--alert)}
.frame.cur{outline:1.5px solid #fff;outline-offset:-1px}
.frame .flag{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;
  background:var(--alert);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:850}

/* ---- Metric cards --------------------------------------------------------*/
.metric{padding:15px 15px 13px}
.metric .ml{font-size:11.5px;font-weight:640;color:var(--muted)}
.metric .mv{font-size:27px;font-weight:840;letter-spacing:-.035em;margin-top:9px;line-height:1;font-variant-numeric:tabular-nums}
.metric .mv small{font-size:12.5px;font-weight:600;color:var(--muted);letter-spacing:0}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:750;margin-top:7px}
.delta svg{width:11px;height:11px}
.delta.up{color:var(--lime)}.delta.down{color:var(--alert)}.delta.flat{color:var(--muted)}
.spark{margin-top:10px;width:100%;height:28px;display:block}

/* ---- Charts --------------------------------------------------------------*/
.chart svg{width:100%;height:auto;display:block;overflow:visible}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:14px;flex-wrap:wrap}
.legend i{display:inline-block;width:15px;height:3px;border-radius:2px;vertical-align:middle;margin-right:7px}

/* ---- Calendar ------------------------------------------------------------*/
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
.cal-h{font-size:10px;font-weight:700;color:var(--muted-2);text-align:center;padding-bottom:2px;letter-spacing:.04em}
.cal-d{aspect-ratio:1;border-radius:12px;display:grid;place-items:center;font-size:12.5px;font-weight:620;
  color:var(--muted);position:relative}
.cal-d.pad{visibility:hidden}
.cal-d.done{background:rgba(135,216,206,.15);color:var(--ink);cursor:pointer;transition:.15s}
.cal-d.done::after{content:"";position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--lime)}
.cal-d.done:hover,.cal-d.done:focus-visible{background:rgba(135,216,206,.3)}
.cal-d.today{background:var(--lime);color:var(--lime-ink);font-weight:750}
.cal-d.today::after{display:none}

/* ---- Segmented -----------------------------------------------------------*/
.seg{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:4px;padding:4px;
  background:var(--glass);border:1px solid var(--stroke);border-radius:var(--r-pill);
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.seg button{height:36px;border-radius:var(--r-pill);font-size:12.5px;font-weight:680;color:var(--muted);transition:.16s}
.seg button[aria-selected="true"]{background:#fff;color:#0c1210}

/* ---- List rows -----------------------------------------------------------*/
.list{background:var(--glass);border:1px solid var(--stroke);border-radius:var(--r-lg);overflow:hidden;
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));box-shadow:var(--hairline)}
.lrow{display:flex;align-items:center;gap:14px;padding:15px 16px;border-top:1px solid var(--stroke)}
.lrow:first-child{border-top:none}
.lrow .ico{width:34px;height:34px;border-radius:11px;background:var(--glass-2);display:grid;place-items:center;flex:0 0 auto}
.lrow .ico svg{width:19px;height:19px;stroke:var(--lime);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.lrow .lm{flex:1;min-width:0}
.lrow .lt{font-size:14.5px;font-weight:620}
.lrow .ls{font-size:12px;color:var(--muted);margin-top:2px}
.chev{color:var(--muted-2);flex:0 0 auto}
.chev svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sw{width:46px;height:28px;border-radius:var(--r-pill);background:rgba(255,255,255,.13);position:relative;transition:.2s;flex:0 0 auto}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw[aria-checked="true"]{background:var(--lime)}
.sw[aria-checked="true"]::after{left:21px}

/* ---- Buttons / inputs ----------------------------------------------------*/
.btn{display:flex;align-items:center;justify-content:center;gap:9px;height:56px;width:100%;
  border-radius:var(--r-pill);font-size:16px;font-weight:770;transition:transform .15s,filter .15s}
.btn-primary{background:var(--lime);color:var(--lime-ink);box-shadow:var(--shadow-lime)}
.btn-primary:active{transform:scale(.98)}
.btn:disabled{opacity:.38;box-shadow:none;cursor:not-allowed}
.btn:disabled:active{transform:none}
.btn-ghost{background:var(--glass-2);border:1px solid var(--stroke-hi);color:var(--ink)}
.btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.input{width:100%;background:var(--glass-2);border:1px solid var(--stroke);border-radius:var(--r-sm);
  padding:14px 16px;font-size:14.5px;color:var(--ink);resize:none}
.input::placeholder{color:var(--muted-2)}.input:focus{outline:none;border-color:var(--lime)}

.sec-title{display:flex;align-items:baseline;justify-content:space-between;margin:24px 2px 12px}
.sec-title .link{font-size:12.5px;font-weight:680;color:var(--lime)}

/* ---- Full-screen overlays (onboarding + zero-screen session) -------------*/
.overlay{position:fixed;inset:0;z-index:100;display:none;background:#060704}
.overlay.show{display:grid;place-items:center}
.ob-inner{position:relative;width:100%;max-width:432px;height:100dvh;max-height:936px;margin:0 auto;
  display:flex;flex-direction:column;padding:0 26px;overflow:hidden;
  background:radial-gradient(120% 80% at 50% 0%,rgba(135,216,206,.10),transparent 55%),linear-gradient(180deg,#0C0D09,#080905)}
@media(min-width:480px){.ob-inner{height:min(93vh,912px);border-radius:54px;box-shadow:0 70px 130px -40px rgba(0,0,0,.85)}}
.ob-top{flex:0 0 auto;padding-top:62px;display:flex;align-items:center;justify-content:space-between}
.ob-dots{display:flex;gap:7px}
.ob-dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.16);transition:.25s}
.ob-dots i.on{width:22px;background:var(--lime)}
.ob-skip{font-size:13px;font-weight:640;color:var(--muted)}
.ob-body{flex:1;display:flex;flex-direction:column;justify-content:center;animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
.ob-hero{margin:0 auto 30px}
.ob-title{font-size:29px;font-weight:830;letter-spacing:-.035em;line-height:1.12}
.ob-sub{font-size:15px;line-height:1.55;color:var(--muted);margin-top:14px}
.ob-foot{flex:0 0 auto;padding-bottom:44px}
.goal-opt{display:flex;align-items:center;gap:14px;width:100%;padding:16px;border-radius:var(--r-md);
  background:var(--glass-2);border:1px solid var(--stroke);text-align:left;transition:.15s}
.goal-opt[aria-pressed="true"]{border-color:var(--lime);background:rgba(135,216,206,.1)}
.goal-opt .gt{font-size:15px;font-weight:700}.goal-opt .gs{font-size:12.5px;color:var(--muted);margin-top:2px}
.goal-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--stroke-hi);flex:0 0 auto;display:grid;place-items:center}
.goal-opt[aria-pressed="true"] .goal-check{background:var(--lime);border-color:var(--lime)}
.goal-opt[aria-pressed="true"] .goal-check svg{opacity:1}
.goal-check svg{width:14px;height:14px;stroke:var(--lime-ink);fill:none;stroke-width:3;opacity:0;stroke-linecap:round;stroke-linejoin:round}

/* zero-screen session overlay */
.zs{position:relative;width:100%;max-width:432px;height:100dvh;max-height:936px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 34px;
  background:radial-gradient(90% 60% at 50% 40%,rgba(135,216,206,.12),transparent 60%),linear-gradient(180deg,#0C0D09,#070804)}
@media(min-width:480px){.zs{height:min(93vh,912px);border-radius:54px}}
.zs-orb{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin-bottom:34px;position:relative}
.zs-orb .core{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--lime-hi),var(--lime-deep));
  box-shadow:0 0 60px rgba(135,216,206,.5);display:grid;place-items:center}
.zs-orb .core svg{width:40px;height:40px;stroke:var(--lime-ink);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.zs-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(135,216,206,.25)}
.zs-spin{position:absolute;inset:0;margin:auto;transform-origin:center;animation:spin 7s linear infinite}
.zs-live{display:flex;align-items:center;gap:22px;margin-top:26px}
.zs-live-col{text-align:center;min-width:82px}
.zs-live-num{font-size:30px;font-weight:820;letter-spacing:-.02em;color:var(--ink);font-variant-numeric:tabular-nums}
.zs-sets-tot{font-size:16px;font-weight:650;color:var(--muted)}
.zs-live-lab{font-size:10px;font-weight:750;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:7px}
.zs-live-div{width:1px;height:36px;background:var(--stroke-hi)}

/* Animations */
.pulse{animation:pulse 1.9s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.96)}}
.breathe{animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.12);opacity:.3}}
.scan-ring{transform-origin:center;animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:absolute;left:50%;bottom:calc(var(--tab-h) + 18px);transform:translateX(-50%) translateY(10px);
  background:rgba(16,18,12,.96);border:1px solid var(--stroke-hi);color:var(--ink);padding:12px 18px;border-radius:var(--r-pill);
  font-size:13.5px;font-weight:620;opacity:0;pointer-events:none;transition:.28s;z-index:60;white-space:nowrap;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Glow joint-mannequin (session report signature) --------------------*/
.avatarWrap{position:relative;z-index:1;max-width:330px;margin:0 auto}
.glowfig{display:block;width:100%;height:auto;overflow:visible}
.figbloom{filter:blur(7px);opacity:.55}
.figbody{opacity:.66;filter:drop-shadow(0 0 7px rgba(135,216,206,.45))}
.figbody line,.figbloom line{stroke:url(#bodyGrad);stroke-linecap:round;fill:none}
.figbody .torso,.figbloom .torso{fill:url(#bodyGrad)}
.figbody .fig-head,.figbloom .fig-head{fill:url(#headGrad)}
.figwire line{stroke:var(--lime);stroke-width:1.5;stroke-linecap:round;opacity:.82}
.figwire .club{stroke:rgba(245,246,240,.6);stroke-width:1.6}
.figwire circle{fill:var(--lime);filter:drop-shadow(0 0 3px rgba(135,216,206,.9))}

/* interactive markers */
.mk{cursor:pointer}
.mk-hit{fill:transparent}
.mk-dot{filter:drop-shadow(0 0 4px currentColor)}
.mk-good .mk-dot{fill:var(--lime)}.mk-good{color:var(--lime)}
.mk-good .mk-ring{stroke:var(--lime)}
.mk-alert .mk-dot{fill:var(--alert)}.mk-alert{color:var(--alert)}
.mk-alert .mk-ring{stroke:var(--alert)}
.mk-ring{fill:none;stroke-width:1.6;transform-box:fill-box;transform-origin:center;
  animation:ripple 2.6s ease-out infinite}
.mk-ring2{animation-delay:1.3s}
@keyframes ripple{0%{transform:scale(.45);opacity:.75}70%{opacity:.12}100%{transform:scale(2.6);opacity:0}}
.mk:hover .mk-dot,.mk:focus-visible .mk-dot{transform-box:fill-box;transform-origin:center;transform:scale(1.25)}

/* leader lines + callouts */
.lead{stroke:var(--alert);stroke-width:1;opacity:.75;stroke-dasharray:1;stroke-dashoffset:1;
  animation:draw .55s cubic-bezier(.4,.7,.3,1) forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.callout{cursor:pointer;animation:coIn .4s .35s both}
@keyframes coIn{from{opacity:0}to{opacity:1}}
.callout rect{fill:rgba(14,16,10,.9);stroke:var(--alert);stroke-opacity:.45;stroke-width:.8}
.callout .co-t{fill:var(--muted);font-size:5.6px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.callout .co-v{fill:var(--alert);font-size:8px;font-weight:800}

.play-pill{cursor:pointer}
.pseg-cap{text-align:center;margin-top:10px}

/* ---- Joint detail: grows out of the tapped joint (kept inside the phone) -*/
.detail-overlay{position:absolute;inset:0;z-index:120;display:none}
.detail-overlay.show{display:flex;align-items:center;justify-content:center;padding:52px 16px 92px}
.detail-back{position:absolute;inset:0;background:rgba(4,5,3,.62);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;transition:opacity .28s ease}
.detail-overlay.in .detail-back{opacity:1}
.detail-card{position:relative;width:100%;max-width:392px;max-height:100%;overflow-y:auto;
  background:linear-gradient(180deg,#0C0D09,#090A06);border:1px solid var(--stroke-hi);
  border-radius:28px;padding:14px 18px 22px;box-shadow:0 40px 90px -30px rgba(0,0,0,.85);
  transform:scale(.05);opacity:.15;
  transition:transform .36s cubic-bezier(.2,.9,.25,1),opacity .26s ease}
.detail-card::-webkit-scrollbar{width:0}.detail-card{scrollbar-width:none}
.detail-overlay.in .detail-card{transform:scale(1);opacity:1}
.detail-overlay.out .detail-card{transform:scale(.05);opacity:0}
.detail-overlay.out .detail-back{opacity:0}
.detail-fig{position:relative;width:100%;height:320px;border-radius:18px;overflow:hidden;margin-top:6px;
  background:radial-gradient(72% 60% at 50% 14%,rgba(135,216,206,.16),transparent 62%),
    linear-gradient(180deg,#0E0F0B,#090A06);border:1px solid var(--stroke)}
.detail-fig .glowfig{position:absolute;inset:0;width:100%;height:100%;max-width:none}
.detail-loop{position:absolute;top:12px;left:12px}
.pill-alert{background:var(--alert-soft);border-color:rgba(255,107,91,.4);color:var(--alert)}
.icon-btn.sm{width:36px;height:36px}.icon-btn.sm svg{width:17px;height:17px}

/* ---- Home D-day bar + Missions -----------------------------------------*/
.dday-bar{display:flex;align-items:center;gap:10px;width:100%;margin-top:12px;padding:13px 20px;
  border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--stroke);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));text-align:left;
  box-shadow:var(--hairline);transition:transform .14s}
.dday-bar:active{transform:scale(.99)}
.dday-bar .chev{display:flex}
.dday-bar .chev svg{width:18px;height:18px;stroke:var(--muted-2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.mission-card{width:100%;text-align:left;transition:transform .14s,border-color .14s}
.mission-card:active{transform:scale(.99)}
.mission-card.is-done{opacity:.62}
.mcheck{width:26px;height:26px;border-radius:50%;border:1.6px solid var(--stroke-hi);flex:0 0 auto;
  display:grid;place-items:center;margin-top:2px}
.mcheck.done{background:#fff;border-color:#fff}
.diff-easy{color:var(--lime);border-color:rgba(135,216,206,.3);background:rgba(135,216,206,.1)}
.diff-hard{color:var(--warn);border-color:rgba(240,181,74,.34);background:var(--warn-soft)}

  box-shadow:0 16px 40px -20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.on-photo .chip{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.24);color:rgba(255,255,255,.85)}
.on-photo .chip[aria-pressed="true"]{background:#fff;color:#0c1210;border-color:#fff}
.on-photo .head .h1,.on-photo .sec-title .h3{text-shadow:0 2px 14px rgba(0,0,0,.5)}
.rp-hero{border-color:rgba(255,255,255,.34)!important}
.rp-hero .h1{text-shadow:0 2px 16px rgba(0,0,0,.5)}

/* ---- Launch / landing screen -------------------------------------------*/
#launch.show{display:grid;place-items:center;background:#050607}
.launch{position:relative;width:100%;max-width:432px;height:100dvh;max-height:936px;
  overflow:hidden;display:flex;flex-direction:column;color:#fff}
@media(min-width:480px){.launch{height:min(93vh,912px);border-radius:54px}}
/* base fallback gradient (golf-course palette) — shows if the photo is absent */
.launch-fallback{position:absolute;inset:0;background:
  radial-gradient(120% 70% at 50% 4%, #2b6f7e 0%, #184b57 26%, transparent 58%),
  linear-gradient(180deg,#1d5866 0%,#123c45 34%,#0e2b31 54%,#0a181c 78%,#060d10 100%)}
.launch-fallback::after{content:"";position:absolute;inset:0;background:
  linear-gradient(180deg,transparent 44%,rgba(150,110,55,.16) 55%,transparent 64%)}

/* dark scrim, heavier toward the bottom for legibility */
.launch-scrim{position:absolute;inset:0;background:linear-gradient(180deg,
  rgba(6,10,12,.22) 0%,rgba(6,10,12,0) 22%,rgba(6,10,12,.32) 52%,
  rgba(6,10,12,.8) 80%,rgba(4,7,9,.96) 100%)}

.launch-top{position:relative;z-index:2;flex:0 0 auto;padding:60px 28px 0}
.brand{display:inline-flex;align-items:center;gap:10px;font-weight:850;font-size:20px;letter-spacing:.16em}
.brand svg{width:26px;height:26px;flex:0 0 auto}
.launch-bottom{position:relative;z-index:2;margin-top:auto;padding:0 28px 46px}
.launch-slogan{font-size:33px;font-weight:850;line-height:1.04;letter-spacing:-.02em;
  text-transform:uppercase;text-wrap:balance;text-shadow:0 2px 24px rgba(0,0,0,.4)}
.launch-slogan em{font-style:normal;color:var(--lime)}
.launch-sub{font-size:14.5px;line-height:1.5;color:rgba(255,255,255,.78);margin-top:14px;max-width:330px}
.launch-cta{display:flex;gap:12px;margin-top:26px}
.launch-cta .btn{flex:1;height:56px;font-size:15.5px;font-weight:750}
/* transparent-glass CTAs — the golf photo shows through almost fully; only
   a light blur + a hairline white border make the glass; text stays white */
.btn-login,.btn-getstarted{color:#fff;
  backdrop-filter:blur(16px) saturate(115%);-webkit-backdrop-filter:blur(16px) saturate(115%);
  text-shadow:0 1px 6px rgba(0,0,0,.55)}
.btn-login{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.24)}
.btn-getstarted{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.42);font-weight:800}
.launch-cta .btn:active{transform:scale(.98)}

/* ---- Past-day record modal (calendar → session view) — kept inside phone -*/
.record-overlay{position:absolute;inset:0;z-index:118;display:none}
.record-overlay.show{display:flex;align-items:center;justify-content:center;padding:52px 16px 92px}
.record-back{position:absolute;inset:0;background:rgba(4,5,3,.62);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;transition:opacity .3s ease}
.record-overlay.in .record-back{opacity:1}
.record-card{position:relative;width:100%;max-width:404px;max-height:100%;
  background:linear-gradient(180deg,#0C0D09,#090A06);border:1px solid var(--stroke-hi);
  border-radius:28px;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 30px 80px -30px rgba(0,0,0,.85);
  transform:scale(.04);opacity:0;transform-origin:center;
  transition:transform .4s cubic-bezier(.2,.9,.25,1),opacity .3s ease}
.record-overlay.in .record-card{transform:scale(1);opacity:1}
.record-head{flex:0 0 auto;display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px 8px}
.record-scroll{flex:1;min-height:0;overflow-y:auto;padding:0 18px 22px}
.record-scroll::-webkit-scrollbar{width:0}.record-scroll{scrollbar-width:none}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001s!important;transition-duration:.05s!important}
  .scan-ring,.pulse,.breathe,.mk-ring,.zs-spin{animation:none!important}
  .lead{stroke-dashoffset:0}
}

</style>
</head>

        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.4c2 0 3.9.8 5.3 2.1l1.2-1.3A9.4 9.4 0 0 0 8.5.6 9.4 9.4 0 0 0 2 3.2l1.2 1.3A7.4 7.4 0 0 1 8.5 2.4Z" fill="currentColor"/><path d="M8.5 6c1 0 2 .4 2.7 1.1l1.2-1.3A6 6 0 0 0 8.5 4a6 6 0 0 0-3.9 1.8l1.2 1.3A3.9 3.9 0 0 1 8.5 6Z" fill="currentColor"/><circle cx="8.5" cy="9.6" r="1.7" fill="currentColor"/></svg>

    </div>

    <!-- Screens render here -->
    <main class="screen" id="screen"></main>

    <!-- Bottom tab bar -->
    <nav class="tabbar" id="tabbar" aria-label="Main"></nav>

  <!-- Launch / landing screen (very first entry) -->

    if(start==null) start=ts;
    let t=(ts-start)/dur;
    if(t>=1){ seg=(seg+1)%(seq.length-1); start=ts; t=0; }
    setPose(svg, lerpPose(seq[seg], seq[seg+1], ease(t)));
    animId=requestAnimationFrame(frame);
  };
  animId=requestAnimationFrame(frame);
}

/* --------------------------------------------------------- charts (svg) -- */
function lineChart(cfg){
  const W=320,H=150,pL=6,pR=6,pT=14,pB=22;
  const vs=cfg.values, n=vs.length;
  const all=vs.concat([cfg.baseline]);
  let lo=Math.min(...all), hi=Math.max(...all);
  const pad=(hi-lo)*.25||1; lo-=pad; hi+=pad;
  const X=i=>pL+(W-pL-pR)*(i/(n-1));
  const Y=v=>pT+(H-pT-pB)*(1-(v-lo)/(hi-lo));
  const pts=vs.map((v,i)=>[X(i),Y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${X(n-1).toFixed(1)} ${H-pB} L ${pL} ${H-pB} Z`;
  const by=Y(cfg.baseline);
  const dots=pts.map((p,i)=>{
    const last=i===n-1;
    return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${last?4.5:2.6}" fill="${last?'#87D8CE':'#0B0C08'}" stroke="#87D8CE" stroke-width="1.8"/>`
      + (last?`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="9" fill="none" stroke="#87D8CE" stroke-opacity=".3" stroke-width="1.5"/>`:'');
  }).join('');
  const labels=cfg.labels.map((l,i)=>`<text x="${X(i).toFixed(1)}" y="${H-6}" fill="#5E6156" font-size="9" font-weight="600" text-anchor="middle">${l}</text>`).join('');
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#87D8CE" stop-opacity=".22"/>
      <stop offset="1" stop-color="#87D8CE" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pL}" y1="${by.toFixed(1)}" x2="${W-pR}" y2="${by.toFixed(1)}" stroke="#5E6156" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="${W-pR}" y="${(by-6).toFixed(1)}" fill="#8E927E" font-size="9" font-weight="700" text-anchor="end">BASELINE ${cfg.baseline}</text>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="#87D8CE" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg></div>`;
}
function sparkline(vs){
  const W=100,H=28,p=3;
  const lo=Math.min(...vs),hi=Math.max(...vs),r=hi-lo||1;
  const X=i=>p+(W-2*p)*(i/(vs.length-1));
  const Y=v=>p+(H-2*p)*(1-(v-lo)/r);
  const d=vs.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const lx=X(vs.length-1).toFixed(1), ly=Y(vs[vs.length-1]).toFixed(1);
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.4" fill="currentColor"/></svg>`;
}
function ring(pct,size=118,sw=11){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#87D8CE" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}
const deltaHTML=(dir,txt)=>{
  const ic = dir==='up' ? '<path d="M12 19V5M6 11l6-6 6 6"/>'
           : dir==='down' ? '<path d="M12 5v14M6 13l6 6 6-6"/>'
           : '<path d="M5 12h14"/>';
  return `<span class="delta ${dir}">${svgIco(ic,'stroke="currentColor" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"')}${txt}</span>`;
};

const phasePose = k => ({Address:POSES.address, Top:POSES.top, Impact:POSES.impact, Finish:POSES.finish}[k]);
const sUp   = v => [v-8,v-6,v-4,v-2,v];
const sDown = v => [v+7,v+6,v+5,v+3,v];

/* today's record (from DATA.report) and per-day past records share one shape */
function todayRecord(){
  const r=DATA.report;
  return { label:r.date, hotspots:HOTSPOTS, finding:r.finding, phases:r.phases,
    metrics:r.metrics, success:r.success, streak:r.streak, improved:r.improved, total:r.total,
    note:'Felt steadier at impact than last time.' };
}
/* Deterministic sample for a past calendar day — earlier days sit closer to the
   baseline, later days show the improvement story. Golf-posture metrics only. */
function makeRecord(day){
  const done=DATA.growth.done, idx=Math.max(0,done.indexOf(day)), n=done.length;
  const prog = n>1 ? idx/(n-1) : 1;                 // 0 earliest .. 1 latest
  const b = prog<.34?0 : prog<.7?1 : 2;             // rough / improving / sharp
  const head=Math.round(78+prog*15), weight=Math.round(63+prog*18), tempo=2.7+prog*0.35;
  const spineAng=Math.round(41-prog*6), drop=spineAng-34, shTop=Math.round(96+(b<2?12:2));
  const st={
    shoulder:{address:'good',top:b<2?'alert':'good',impact:'good',finish:'good'},
    spine:{address:'good',top:'good',impact:b===0?'alert':'good',finish:'good'},
    wrist:{address:'good',top:'good',impact:b===0?'alert':'good',finish:'good'},
    pelvis:{address:'good',top:'good',impact:'good',finish:'good'},
  };
  const hs=HOTSPOTS.map(h=>{
    const o={...h, st:st[h.id], m:{...h.m}};
    if(h.id==='spine')    o.m={...h.m, impact:[`${spineAng}°`, drop>1?`Collapsed ${drop}° — standing up`:'Held your angle through']};
    if(h.id==='shoulder') o.m={...h.m, top:[`Turn ${shTop}°`, b<2?`+${shTop-92}° past your top`:'On plane']};
    if(h.id==='wrist')    o.m={...h.m, impact: st.wrist.impact==='alert'?['Late 0.05s','Releasing behind the ball']:['On time','Squares at the ball']};
    if(h.id==='pelvis')   o.m={...h.m, impact:[`${weight}% lead`,'Driving onto the lead side']};
    return o;
  });
  const wristAlert = st.wrist.impact==='alert';
  const metrics=[
    {k:'Tempo', v:tempo.toFixed(1), sub:':1 back·down', dir:'up', d:'+'+(0.1*(1+idx%2)).toFixed(1), spark:[2.6,2.7,2.7,+(tempo-.1).toFixed(1),+tempo.toFixed(1)]},
    {k:'Head Steadiness', v:''+head, sub:'%', dir:'up', d:'+'+(2+b), spark:sUp(head)},
    {k:'Weight Transfer', v:''+weight, sub:'% to lead', dir:'up', d:'+'+(3+b), spark:sUp(weight)},
    wristAlert
      ? {k:'Wrist Release', v:'Late', sub:'timing', dir:'down', d:'−3', spark:sDown(84), warn:true}
      : {k:'Wrist Release', v:'On time', sub:'timing', dir:'up', d:'+2', spark:sUp(86)},
  ];
  const phases=['Address','Top','Impact','Finish'].map(k=>({k, warn: hs.some(h=>h.st[k.toLowerCase()]==='alert')}));
  const finding = b===0
    ? 'Early session — the top over-rotated and you lost spine angle at impact. A clear place to build from.'
    : b===1 ? 'Cleaner through impact today. The one thing left is trimming the over-rotation at the top.'
    : 'Sharp from address to finish — posture held all the way through the strike.';
  return { label:`Jul ${day}, 2026`, hotspots:hs, finding, phases, metrics,
    success: Math.round(66+prog*24+(day%3)*2), streak: idx+1,
    improved: metrics.filter(m=>m.dir==='up').length, total:4,
    note: b===2?'Best it’s felt in weeks.':b===1?'Getting more repeatable.':'Rough, but a start.' };
}

  clearReplay();
  const seq=['address','top','impact','finish','impact'];
  state.replaying=true; let i=0; state.reportPhase=seq[0]; paintAvatar();

function miniHotspot(phaseKey,h){
  const pose=POSES[phaseKey], [x,y]=hsPoint(pose,h.id), s=h.st[phaseKey];
  const col=s==='alert'?'var(--alert)':'var(--lime)';
  return `<svg viewBox="0 0 200 300" class="skeleton">${skeletonInner(pose)}
    <circle cx="${x}" cy="${y}" r="11" fill="none" stroke="${col}" stroke-width="2" opacity=".75"/>
    <circle cx="${x}" cy="${y}" r="4.5" fill="${col}"/></svg>`;
}
/* Anchor a scale-in card's transform-origin to the point that was tapped, so
   it appears to grow out of that spot. Measures the untransformed layout box. */
function growFrom(card, originEl){
  if(!card || !originEl) return;
  card.style.transition='none';
  const saved=card.style.transform;
  card.style.transform='none';                 // measure the full-size layout box
  const cr=card.getBoundingClientRect();
  card.style.transform=saved;                  // back to the CSS start state (scaled)
  const r=originEl.getBoundingClientRect();
  card.style.transformOrigin=`${(r.left+r.width/2-cr.left).toFixed(1)}px ${(r.top+r.height/2-cr.top).toFixed(1)}px`;
  void card.offsetWidth;                        // flush with transition off
  card.style.transition='';                     // restore the stylesheet transition
}

/* ---- Joint detail: card grows out of the tapped joint, close-up loops ---- */
let detail=null, detailRAF=null;

function jointViewBox(id){
  const ps=['address','top','impact','finish'].map(p=>hsPoint(POSES[p],id));
  let minX=Math.min(...ps.map(p=>p[0])), maxX=Math.max(...ps.map(p=>p[0]));
  let minY=Math.min(...ps.map(p=>p[1])), maxY=Math.max(...ps.map(p=>p[1]));
  const pad=34; minX-=pad; maxX+=pad; minY-=pad; maxY+=pad;
  let w=maxX-minX, h=maxY-minY; const min=104;           // floor keeps near-static joints framed
  if(w<min){minX-=(min-w)/2; w=min;} if(h<min){minY-=(min-h)/2; h=min;}
  return `${minX.toFixed(0)} ${minY.toFixed(0)} ${w.toFixed(0)} ${h.toFixed(0)}`;
}

      <div class="detail-fig" id="detailFig">
        <svg class="glowfig" viewBox="${jointViewBox(id)}">${glowFigureAnim(POSES[detail.phase])}</svg>
        <span class="pill pill-lime detail-loop"><span class="dot"></span>Looping swing</span>
      </div>
      <div id="detailInfo" style="margin-top:14px">${detailInfoHTML(h,detail.phase)}</div>
    </div>`;
  o.classList.add('show');
  growFrom(o.querySelector('.detail-card'), originEl);   // grow out of the tapped joint
  setTimeout(()=>o.classList.add('in'),20);              // reveal (fires even when rAF is throttled)
  startDetailLoop();
}
function startDetailLoop(){
  stopDetailLoop();
  const svg=$('#detailFig .glowfig'); if(!svg) return;
  if(RM){ setGlowPose(svg,POSES.impact); return; }
  const seq=['address','top','impact','finish','address'], dur=820;
  let seg=0, start=null;
  const frame=ts=>{
    if(!svg.isConnected){ detailRAF=null; return; }
    if(start==null) start=ts;
    let t=(ts-start)/dur;
    if(t>=1){ seg=(seg+1)%(seq.length-1); start=ts; t=0; }
    setGlowPose(svg, lerpPose(POSES[seq[seg]], POSES[seq[seg+1]], ease(t)));
    detailRAF=requestAnimationFrame(frame);
  };
  detailRAF=requestAnimationFrame(frame);
}
function stopDetailLoop(){ if(detailRAF){ cancelAnimationFrame(detailRAF); detailRAF=null; } }

function selectDetailPhase(p){
  if(!detail) return; detail.phase=p;
  const h=HS().find(x=>x.id===detail.id);
  const info=$('#detailInfo'); if(info) info.innerHTML=detailInfoHTML(h,p);
  document.querySelectorAll('#detailThumbs .frame').forEach(f=>
    f.classList.toggle('cur', f.getAttribute('data-act')===`dphase:${p}`));
}
function closeDetail(){
  const o=$('#detail'); if(!o || !o.classList.contains('show')) return;
  stopDetailLoop();
  o.classList.remove('in'); o.classList.add('out');
  const done=()=>{ o.classList.remove('show','out'); detail=null; };
  const card=o.querySelector('.detail-card');
  if(card) card.addEventListener('transitionend',done,{once:true});
  setTimeout(done,420);                                   // fallback if transitionend misses
}
function hardCloseDetail(){ stopDetailLoop(); const o=$('#detail'); if(o){ o.className='detail-overlay'; o.innerHTML=''; } detail=null; }

/* ================================================================ EVENTS = */
function greeting(){ return 'Good evening'; }

function toast(msg){
  let t=$('#toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; $('#phone').appendChild(t); }
  t.textContent=msg; requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900);
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const [act,arg]=el.dataset.act.split(':');

  switch(act){
    case 'nav': nav(arg); break;
    case 'start': startSession(); break;
    case 'toast': toast(el.dataset.act.slice(6)); break;

    case 'mood':
      state.mood=+arg;
      syncPressed('mood:', a=>+a===state.mood);           // highlight only the tapped emoji
      updateAdjust();
      break;
    case 'area':
      toggleArea(arg);
      syncPressed('area:', a=>state.areas.has(a));         // reflect the whole set (None exclusivity)
      updateAdjust();
      break;

    case 'gtab': state.growthTab=arg; render(); break;
    case 'mcat': state.missionCat=arg; render(); break;
    case 'roundprep': startSession(ROUND_PREP); break;
    case 'mission': startMission(arg); break;
    case 'day': openDayRecord(+arg, el); break;
    case 'record-close': closeDayRecord(); break;

    case 'replay': replaySwing(); break;
    case 'rphase': setReportPhase(arg); break;
    case 'hs': openDetail(arg, el); break;
    case 'hs-close': closeDetail(); break;
    case 'dphase': selectDetailPhase(arg); break;
    case 'save-reflect': {
      const v=($('#reflect')?.value||'').trim();
      toast(v?'Reflection saved · session complete':'Session saved to your records');
      state.reflected=true; setTimeout(()=>nav('home'),700); break;
    }
    case 'sw': { const on=el.getAttribute('aria-checked')==='true'; el.setAttribute('aria-checked',String(!on)); break; }

    case 'ob':
      if(arg==='restart'){ state.ob=0; showOnboarding(); }
      break;
    case 'launch-start': hideLaunch(); state.ob=0; showOnboarding(); break;
    case 'launch-login': hideLaunch(); nav('home'); break;
    case 'ob-next': obNext(); break;
    case 'ob-skip': hideOnboarding(); break;
    case 'ob-score': state.obScore=+arg; syncPressed('ob-score:', a=>+a===state.obScore); updateGoalCta(); break;
    case 'ob-round': state.obRound=+arg; syncPressed('ob-round:', a=>+a===state.obRound); updateGoalCta(); break;
    case 'zs-done':
      stopZsTimer(); hideOverlay('#zs');
      if(!state.hasBaseline){ state.hasBaseline=true; state.baselineJustSet=true;
        DATA.user.baselineDate='Today'; }
      nav('report'); break;
    case 'zs-cancel': stopZsTimer(); hideOverlay('#zs'); break;
  }
});

function toggleArea(a){
  if(a==='None'){ state.areas.clear(); state.areas.add('None'); return; }
  state.areas.delete('None');
  state.areas.has(a)? state.areas.delete(a) : state.areas.add(a);
}
function adjustNoteHTML(){
  return `<div class="row gap-8 mt-16" style="align-items:flex-start;padding-top:14px;border-top:1px solid rgba(12,13,9,.14)">
    ${svgIco(I.bolt,'fill="#08211d" stroke="none" style="width:16px;height:16px;flex:0 0 auto;margin-top:1px"')}
    <span class="small" style="color:rgba(12,13,9,.78);font-weight:600">${DATA.mission.adjusted}</span></div>`;
}
/* Update ONLY the mission card's auto-adjust note — no full re-render, no flicker */
function updateAdjust(){
  const box=$('#missionAdjust'); if(!box) return;      // absent for fresh-user card
  const show = state.mood===2 || state.areas.size>0;
  box.innerHTML = show ? adjustNoteHTML() : '';
}
/* Reflect a single-select group's state on its buttons via aria-pressed only */
function syncPressed(prefix, isOn){
  document.querySelectorAll(`[data-act^="${prefix}"]`).forEach(b=>
    b.setAttribute('aria-pressed', String(isOn(b.dataset.act.slice(prefix.length)))));
}

/* ---- In-session "Training in progress" screen (zero-screen philosophy) --- */
function guessSets(goal){
  const nums=(goal.match(/\d+/g)||[]).map(Number).filter(n=>n>=4 && n<=30);
  return nums.length?Math.max(...nums):10;
}
function startMission(id){
  const m=DATA.missions.find(x=>x.id===id); if(!m) return;
  startSession({title:m.goal, mode:m.mode, min:m.min, sets:guessSets(m.goal)});
}
const zsFmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
function stopZsTimer(){ if(state.zsTimer){ clearInterval(state.zsTimer); state.zsTimer=null; } }

function startSession(mission){
  stopZsTimer();
  let z=$('#zs');
  if(!z){ z=document.createElement('div'); z.id='zs'; z.className='overlay'; document.body.appendChild(z); }
  const m=mission||DATA.mission, first=!state.hasBaseline;
  state.sessionType = m.mode==='Putt' ? 'putt' : 'swing';   // decides the report layout
  const N=m.sets||10, name=first?'Baseline session':(m.title||'Practice');
  z.innerHTML=`<div class="zs">
    <div class="zs-orb">
      <div class="zs-ring breathe"></div>
      <svg class="zs-spin" width="170" height="170" viewBox="0 0 170 170" aria-hidden="true">
        <circle cx="85" cy="85" r="76" fill="none" stroke="rgba(135,216,206,.4)" stroke-width="2" stroke-dasharray="3 15" stroke-linecap="round"/></svg>
      <div class="core">${svgIco(I.voice,'stroke="var(--lime-ink)" fill="none" stroke-width="2" style="width:38px;height:38px"')}</div>
    </div>
    <div class="eyebrow">Training in progress</div>
    <div class="h1" style="margin-top:10px;max-width:280px">Put your phone down</div>
    <p class="body dim" style="margin-top:12px;max-width:300px">
      ${first
        ? `Swing naturally — CALIBR is reading your posture by voice. <b style="color:var(--ink)">Tonight becomes your baseline.</b>`
        : `CALIBR is coaching by voice. No screen while you swing — come back when you’re done.`}</p>
    <div class="row gap-8 wrap" style="justify-content:center;margin-top:16px">
      <span class="pill pill-lime"><span class="dot"></span>${m.mode||'Mixed'}</span>
      <span class="pill">${name}</span>
    </div>
    <div class="zs-live">
      <div class="zs-live-col"><div class="zs-live-num" id="zsElapsed">00:00</div><div class="zs-live-lab">Elapsed</div></div>
      <div class="zs-live-div"></div>
      <div class="zs-live-col"><div class="zs-live-num" id="zsSets">1<span class="zs-sets-tot"> / ${N}</span></div><div class="zs-live-lab">Sets</div></div>
    </div>
    <div style="position:absolute;left:26px;right:26px;bottom:44px">
      <button class="btn btn-primary" data-act="zs-done">End session${first?' — save baseline':''}</button>
      <button class="btn btn-ghost" data-act="zs-cancel" style="margin-top:12px;height:48px;font-size:14.5px">Cancel — don’t save</button>
    </div></div>`;
  z.classList.add('show');
  // live, minimal progress (setInterval fires even in throttled tabs)
  state.zsElapsed=0;
  const el=$('#zsElapsed'), setsEl=$('#zsSets');
  state.zsTimer=setInterval(()=>{
    state.zsElapsed++;
    if(el) el.textContent=zsFmt(state.zsElapsed);
    const set=Math.min(N, 1+Math.floor(state.zsElapsed/6));
    if(setsEl) setsEl.innerHTML=`${set}<span class="zs-sets-tot"> / ${N}</span>`;
  },1000);
}
function hideOverlay(sel){ const o=$(sel); if(o) o.classList.remove('show'); }

/* ---------------------------------------------------------- ONBOARDING --- */
/* Phone-only: concept → pair → home position → goal. No swing capture here —
   the first real session becomes the baseline automatically. */
const OB=[
  { key:'concept', hero:()=>`<div class="avatar-stage" style="width:210px;height:230px;margin:0 auto">
        <div class="avatar-grid"></div>${buildSkeleton(POSES.finish)}</div>`,
    title:'You won’t look at<br>a screen while you train.',
    sub:'CALIBR coaches you by voice while you swing — no screen, no ball, no mat. The app briefs your mission before, and reviews your posture after.',
    cta:'Get started' },
  { key:'pair', hero:()=>`<div style="width:150px;height:150px;margin:0 auto;position:relative;display:grid;place-items:center">
        <svg class="scan-ring" width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="66" fill="none" stroke="rgba(135,216,206,.25)" stroke-width="2" stroke-dasharray="6 12"/></svg>
        <div style="position:absolute;width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--lime-hi),var(--lime-deep));display:grid;place-items:center;box-shadow:0 0 50px rgba(135,216,206,.4)">
          ${svgIco(I.bt,'stroke="var(--lime-ink)" fill="none" stroke-width="2" style="width:38px;height:38px"')}</div></div>`,
    title:'Pair your club &amp; stand',
    sub:'Power on the club and set your phone in the stand. We found <b style="color:var(--ink)">CALIBR-0417</b> — connecting now.<br><br><b style="color:var(--lime)">Just this once</b> — after today, picking up the club or setting it in the stand connects it automatically.',
    cta:'Connected — continue' },
  { key:'goal', hero:null, title:'Set your goal',
    sub:'Your target score and next round shape each night’s mission. Change it anytime.',
    cta:'Finish setup' },
];
const SCORES=[['Break 100'],['Break 95'],['Break 90'],['Break 85']];
const ROUNDS=[['This weekend',3],['In 2 weeks',14],['In a month',30],['Not scheduled',null]];

function showOnboarding(){ $('#onboarding').className='overlay show'; renderOnboarding(); }
function hideOnboarding(){ $('#onboarding').className='overlay'; stopAnim(); }
const goalReady=()=> state.obScore!=null && state.obRound!=null;
/* Toggle the Finish button live (no full re-render) as goal options are picked */
function updateGoalCta(){
  const btn=$('#onboarding [data-act="ob-next"]');
  if(btn) btn.disabled=!goalReady();
}
function obNext(){ if(state.ob>=OB.length-1){ finishOnboarding(); } else { state.ob++; renderOnboarding(); } }
function finishOnboarding(){
  if(!goalReady()) return;          // need both a score and a round first
  DATA.user.goal=SCORES[state.obScore][0];
  const rd=ROUNDS[state.obRound][1];
  DATA.user.roundInDays = rd==null ? null : rd;
  state.hasBaseline=false;          // fresh user — first session becomes baseline
  state.baselineJustSet=false;
  hideOnboarding(); nav('home');
  toast('All set — your first session sets your baseline');
}
function renderOnboarding(){
  const s=OB[state.ob];
  const dots=OB.map((_,i)=>`<i class="${i===state.ob?'on':''}"></i>`).join('');
  const goalBody=`<div>
    <div class="eyebrow" style="margin-bottom:11px">Target score</div>
    <div class="chips">${SCORES.map((g,i)=>`<button class="chip" data-act="ob-score:${i}" aria-pressed="${state.obScore===i}">${g[0]}</button>`).join('')}</div>
    <div class="eyebrow" style="margin:20px 0 11px">Next round</div>
    <div class="chips">${ROUNDS.map((r,i)=>`<button class="chip" data-act="ob-round:${i}" aria-pressed="${state.obRound===i}">${r[0]}</button>`).join('')}</div>
  </div>`;

  $('#onboarding').innerHTML=`<div class="ob-inner">
    <div class="ob-top"><div class="ob-dots">${dots}</div>
      <button class="ob-skip" data-act="ob-skip">Skip</button></div>
    <div class="ob-body">
      ${s.key==='goal'?'':`<div class="ob-hero">${s.hero()}</div>`}
      <div class="ob-title">${s.title}</div>
      <p class="ob-sub">${s.sub}</p>
      ${s.key==='goal'?`<div style="margin-top:26px">${goalBody}</div>`:''}
    </div>
    <div class="ob-foot"><button class="btn btn-primary" data-act="ob-next" ${s.key==='goal'&&!goalReady()?'disabled':''}>${s.cta}</button></div>
  </div>`;
}

/* ----------------------------------------------------------- LAUNCH ------ */
function renderLaunch(){
  const mark=`<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <circle cx="12" cy="12" r="9" stroke="var(--lime)" stroke-width="2"/>
    <circle cx="12" cy="12" r="3" fill="var(--lime)"/>
    <path d="M12 1.5v4M12 18.5v4M1.5 12h4M18.5 12h4" stroke="var(--lime)" stroke-width="2" stroke-linecap="round"/></svg>`;
  $('#launch').innerHTML=`<div class="launch">
    <div class="launch-fallback"></div>
    <div class="launch-bg"></div>
    <div class="launch-scrim"></div>
    <div class="launch-top"><span class="brand">${mark}CALIBR</span></div>
    <div class="launch-bottom">
      <div class="launch-slogan">Train every day<br>Break every limit</div>
      <div class="launch-sub">Zero-screen coaching for the range in your living room — brief before, review after.</div>
      <div class="launch-cta">
        <button class="btn btn-login" data-act="launch-login">Log in</button>
        <button class="btn btn-getstarted" data-act="launch-start">Get started</button>
      </div>
    </div>
  </div>`;
}
function showLaunch(){ $('#launch').className='overlay show'; renderLaunch(); }
function hideLaunch(){ $('#launch').className='overlay'; }

/* ================================================================= INIT === */
function init(){
  const q=new URLSearchParams(location.search);
  const scr=q.get('screen');
  if(scr && SCREENS[scr]) state.screen=scr;          // deep-link a screen
  if(q.get('tab')) state.growthTab=q.get('tab');
  renderTabbar();
  render();
  if(scr) return;                                    // deep-linked into the app — skip intro
  if(q.get('launch')==='0'){ if(q.get('ob')!=='0') showOnboarding(); }
  else showLaunch();                                 // first entry: launch screen
}
init();

</script>
</body>
